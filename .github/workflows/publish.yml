name: Publish Plugin

on:
  release:
    types: [published]

permissions:
  contents: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Derive version from tag
        id: ver
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-.+)?$ ]]; then
            echo "::error::Tag '$TAG' must match vMAJOR.MINOR.PATCH(-suffix)?"
            exit 1
          fi
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - run: chmod +x ./gradlew

      - name: Verify plugin
        run: ./gradlew -Pversion=${{ steps.ver.outputs.version }} verifyPlugin

      - name: Publish to JetBrains Marketplace
        run: ./gradlew -Pversion=${{ steps.ver.outputs.version }} publishPlugin
        env:
          PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
          CERTIFICATE_CHAIN: ${{ secrets.CERTIFICATE_CHAIN }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          PRIVATE_KEY_PASSWORD: ${{ secrets.PRIVATE_KEY_PASSWORD }}

      - name: Attach signed zip to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/distributions/*.zip
